services:
  - type: web
    name: calendario-inspecciones
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: INSPECCIONES_DATA_DIR
        value: /opt/render/project/data